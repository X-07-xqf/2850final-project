name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        # The gradle project root sits inside this subdirectory (the repo
        # also contains .devcontainer/ and Markdown docs at the top level).
        working-directory: "2850final project"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('2850final project/**/*.gradle*', '2850final project/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew build test --no-daemon --stacktrace

      - name: Static analysis (Detekt)
        run: ./gradlew detekt --no-daemon
        continue-on-error: true   # report findings without blocking the build while we tune rules

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: "2850final project/build/reports/tests/test"
          if-no-files-found: ignore

      - name: Publish detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: "2850final project/build/reports/detekt"
          if-no-files-found: ignore
