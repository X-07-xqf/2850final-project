<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Messages — Pro — Sage</title>
    <link rel="stylesheet" th:href="'/static/css/styles.css'" href="/static/css/styles.css"/>
</head>
<body class="app-body">
<a href="#main" class="skip-link">Skip to main content</a>
<button type="button" class="menu-toggle js-menu-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
<div class="sidebar-backdrop js-sidebar-backdrop" aria-hidden="true"></div>
<div class="app-layout">
    <aside class="sidebar sidebar--pro">
        <div class="sidebar__brand">
            <span class="sidebar__logo" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24"><defs><filter id="paint" x="-10%" y="-10%" width="120%" height="120%"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="0.7"/></filter><linearGradient id="grad" x1="20%" y1="20%" x2="80%" y2="80%"><stop offset="0%" stop-color="currentColor" stop-opacity="0.92"/><stop offset="55%" stop-color="currentColor" stop-opacity="1"/><stop offset="100%" stop-color="currentColor" stop-opacity="0.82"/></linearGradient></defs><g filter="url(#paint)"><path d="M20 4 C 13 3, 4 9, 4 16 C 4 20, 7 20, 11 19 C 19 17, 21 11, 20 4 Z" fill="url(#grad)"/><path d="M8 16 C 11 12, 15 8, 18 5" fill="none" stroke="var(--color-primary)" stroke-width="2.2" stroke-linecap="round"/></g></svg></span>
            <span class="sidebar__title">Pro portal</span>
        </div>
        <p class="sidebar__user" th:if="${session}" th:text="${session.fullName}">Pro</p>
        <nav class="sidebar__nav" aria-label="Professional">
            <a th:href="'/pro/dashboard'" th:classappend="${activePage == 'dashboard'} ? ' nav-link--active'" class="nav-link">Clients</a>
            <a th:href="'/messages'" th:classappend="${activePage == 'messages'} ? ' nav-link--active'" class="nav-link">
                Messages
                <span th:if="${unreadMessages != null and unreadMessages > 0}" class="badge" th:text="${unreadMessages}">0</span>
            </a>
        </nav>
        <button type="button" class="sidebar__theme js-theme-toggle" aria-label="Toggle theme">Toggle theme</button>
        <a th:href="'/logout'" class="nav-link nav-link--muted sidebar__logout">Log out</a>
    </aside>
    <main id="main" class="main main--chat">
        <header class="page-header">
            <h1 class="page-title">Messages</h1>
            <p class="page-meta">Message your clients</p>
        </header>

        <div class="chat-layout card card--flush">
            <aside class="chat-sidebar">
                <h2 class="chat-sidebar__title">Conversations</h2>
                <ul class="conv-list" th:if="${partners != null and !partners.isEmpty()}">
                    <li th:each="p : ${partners}">
                        <a th:href="|/messages/${p.partnerId}|" class="conv-list__item"
                           th:classappend="${activePartnerId != null and activePartnerId == p.partnerId} ? ' conv-list__item--active' : ''">
                            <span class="conv-list__avatar" th:text="${p.partnerInitials}">AB</span>
                            <div class="conv-list__body">
                                <span class="conv-list__name" th:text="${p.partnerName}">Name</span>
                                <span class="conv-list__preview" th:text="${p.lastMessage}">…</span>
                            </div>
                            <span th:if="${p.unreadCount != null and p.unreadCount > 0}" class="badge badge--sm" th:text="${p.unreadCount}">1</span>
                        </a>
                    </li>
                </ul>
                <p class="empty-hint empty-hint--pad" th:if="${partners == null or partners.isEmpty()}">No conversations yet.</p>
            </aside>
            <section class="chat-main">
                <header class="chat-main__head" th:if="${activePartnerId != null}">
                    <span class="conv-list__avatar" th:text="${activePartnerInitials}">AB</span>
                    <h2 class="chat-main__title" th:text="${activePartnerName}">Partner</h2>
                </header>
                <div class="chat-main__head chat-main__head--empty" th:if="${activePartnerId == null}">
                    <p class="empty-hint">Select a client conversation.</p>
                </div>
                <div class="chat-scroll" role="log" aria-live="polite" th:if="${activePartnerId != null}">
                    <div th:each="m : ${conversation}"
                         th:class="${m.isMine} ? 'bubble bubble--mine' : 'bubble bubble--theirs'">
                        <p class="bubble__text" th:text="${m.message}">Text</p>
                        <time class="bubble__time" th:text="${m.sentAt}">Time</time>
                    </div>
                    <p class="empty-hint" th:if="${conversation == null or conversation.isEmpty()}">No messages yet.</p>
                </div>
                <form th:if="${activePartnerId != null}" class="chat-compose" th:action="|/messages/${activePartnerId}|" method="post">
                    <label class="sr-only" for="pro-msg-input">Message</label>
                    <textarea id="pro-msg-input" name="message" rows="2" required placeholder="Write a message…"></textarea>
                    <button type="submit" class="btn btn--primary">Send</button>
                </form>
            </section>
        </div>
    </main>
</div>
<script th:src="'/static/js/app.js'" src="/static/js/app.js"></script>
</body>
</html>
