<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard — Good Food</title>
    <link rel="stylesheet" th:href="'/static/css/styles.css'" href="/static/css/styles.css"/>
</head>
<body class="app-body">
<button type="button" class="menu-toggle js-menu-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
<div class="sidebar-backdrop js-sidebar-backdrop" aria-hidden="true"></div>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__logo">🥗</span>
            <span class="sidebar__title">Good Food</span>
        </div>
        <p class="sidebar__user" th:if="${session}" th:text="${session.fullName}">User</p>
        <nav class="sidebar__nav" aria-label="Main">
            <a th:href="'/dashboard'" th:classappend="${activePage == 'dashboard'} ? ' nav-link--active'" class="nav-link">Dashboard</a>
            <a th:href="'/diary'" th:classappend="${activePage == 'diary'} ? ' nav-link--active'" class="nav-link">Diary</a>
            <a th:href="'/recipes'" th:classappend="${activePage == 'recipes'} ? ' nav-link--active'" class="nav-link">Recipes</a>
            <a th:href="'/goals'" th:classappend="${activePage == 'goals'} ? ' nav-link--active'" class="nav-link">Goals</a>
            <a th:href="'/messages'" th:classappend="${activePage == 'messages'} ? ' nav-link--active'" class="nav-link">
                Messages
                <span th:if="${unreadMessages != null and unreadMessages > 0}" class="badge" th:text="${unreadMessages}">0</span>
            </a>
            <a th:href="'/profile'" th:classappend="${activePage == 'profile'} ? ' nav-link--active'" class="nav-link">Profile</a>
        </nav>
        <button type="button" class="sidebar__theme js-theme-toggle" aria-label="Toggle theme">Toggle theme</button>
        <a th:href="'/logout'" class="nav-link nav-link--muted sidebar__logout">Log out</a>
    </aside>
    <main class="main">
        <header class="page-header">
            <h1 class="page-title">Today’s nutrition</h1>
            <p class="page-meta" th:text="${date}">Date</p>
        </header>

        <section class="card macro-grid" aria-label="Daily macros">
            <div class="macro-card">
                <h2 class="macro-card__label">Calories</h2>
                <p class="macro-card__value"><span th:text="${totalCalories}">0</span> / <span th:text="${goalCalories}">2000</span> kcal</p>
                <div class="progress" role="progressbar" th:attr="aria-valuenow=${pctCalories}" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress__fill progress__fill--cal" th:style="|width: ${pctCalories}%;|"></div>
                </div>
            </div>
            <div class="macro-card">
                <h2 class="macro-card__label">Protein</h2>
                <p class="macro-card__value"><span th:text="${totalProtein}">0</span> / <span th:text="${goalProtein}">80</span> g</p>
                <div class="progress" role="progressbar" th:attr="aria-valuenow=${pctProtein}" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress__fill progress__fill--prot" th:style="|width: ${pctProtein}%;|"></div>
                </div>
            </div>
            <div class="macro-card">
                <h2 class="macro-card__label">Carbs</h2>
                <p class="macro-card__value"><span th:text="${totalCarbs}">0</span> / <span th:text="${goalCarbs}">250</span> g</p>
                <div class="progress" role="progressbar" th:attr="aria-valuenow=${pctCarbs}" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress__fill progress__fill--carb" th:style="|width: ${pctCarbs}%;|"></div>
                </div>
            </div>
            <div class="macro-card">
                <h2 class="macro-card__label">Fat</h2>
                <p class="macro-card__value"><span th:text="${totalFat}">0</span> / <span th:text="${goalFat}">65</span> g</p>
                <div class="progress" role="progressbar" th:attr="aria-valuenow=${pctFat}" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress__fill progress__fill--fat" th:style="|width: ${pctFat}%;|"></div>
                </div>
            </div>
        </section>

        <section class="meals-section" th:each="meal : ${meals}">
            <header class="meals-section__head">
                <h2 class="meals-section__title" th:text="${#strings.capitalize(meal.type)}">Breakfast</h2>
                <span class="meals-section__kcal"><span th:text="${meal.calories}">0</span> kcal</span>
            </header>
            <ul class="entry-list" th:if="${meal.entries != null and !meal.entries.isEmpty()}">
                <li class="entry-list__item" th:each="e : ${meal.entries}">
                    <span class="entry-list__name" th:text="${e.foodName}">Food</span>
                    <span class="entry-list__meta">
                        <span th:text="${e.quantity}">100</span> g ·
                        <span th:text="${e.calories}">0</span> kcal
                    </span>
                </li>
            </ul>
            <p class="empty-hint" th:if="${meal.entries == null or meal.entries.isEmpty()}">No foods logged for this meal.</p>
        </section>
    </main>
</div>
<script th:src="'/static/js/app.js'" src="/static/js/app.js"></script>
</body>
</html>
