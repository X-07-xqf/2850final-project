<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Food diary — Good Food</title>
    <link rel="stylesheet" th:href="'/static/css/styles.css'" href="/static/css/styles.css"/>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__logo">🥗</span>
            <span class="sidebar__title">Good Food</span>
        </div>
        <p class="sidebar__user" th:if="${session}" th:text="${session.fullName}">User</p>
        <nav class="sidebar__nav" aria-label="Main">
            <a th:href="'/dashboard'" th:classappend="${activePage == 'dashboard'} ? ' nav-link--active'" class="nav-link">Dashboard</a>
            <a th:href="'/diary'" th:classappend="${activePage == 'diary'} ? ' nav-link--active'" class="nav-link">Diary</a>
            <a th:href="'/recipes'" th:classappend="${activePage == 'recipes'} ? ' nav-link--active'" class="nav-link">Recipes</a>
            <a th:href="'/goals'" th:classappend="${activePage == 'goals'} ? ' nav-link--active'" class="nav-link">Goals</a>
            <a th:href="'/messages'" th:classappend="${activePage == 'messages'} ? ' nav-link--active'" class="nav-link">
                Messages
                <span th:if="${unreadMessages != null and unreadMessages > 0}" class="badge" th:text="${unreadMessages}">0</span>
            </a>
            <a th:href="'/profile'" th:classappend="${activePage == 'profile'} ? ' nav-link--active'" class="nav-link">Profile</a>
        </nav>
        <a th:href="'/logout'" class="nav-link nav-link--muted sidebar__logout">Log out</a>
    </aside>
    <main class="main">
        <header class="page-header page-header--row">
            <div>
                <h1 class="page-title">Food diary</h1>
                <p class="page-meta" th:text="${dateFormatted}">Date</p>
            </div>
            <div class="date-nav">
                <a class="btn btn--ghost" th:href="|/diary?date=${prevDate}|">← Previous</a>
                <a class="btn btn--ghost" th:href="'/diary'">Today</a>
                <a class="btn btn--ghost" th:href="|/diary?date=${nextDate}|">Next →</a>
            </div>
        </header>

        <section class="card summary-strip" aria-label="Day summary">
            <div class="summary-strip__item"><strong th:text="${summary.calories}">0</strong> kcal</div>
            <div class="summary-strip__item">P <span th:text="${summary.protein}">0</span> g</div>
            <div class="summary-strip__item">C <span th:text="${summary.carbs}">0</span> g</div>
            <div class="summary-strip__item">F <span th:text="${summary.fat}">0</span> g</div>
        </section>

        <section class="meals-section" th:each="meal : ${meals}">
            <header class="meals-section__head">
                <h2 class="meals-section__title" th:text="${#strings.capitalize(meal.type)}">Breakfast</h2>
                <div class="meals-section__actions">
                    <span class="meals-section__kcal"><span th:text="${meal.calories}">0</span> kcal</span>
                    <button type="button" class="btn btn--small btn--primary js-open-food-modal" th:attr="data-meal-type=${meal.type}">Add food</button>
                </div>
            </header>
            <ul class="entry-list" th:if="${meal.entries != null and !meal.entries.isEmpty()}">
                <li class="entry-list__item entry-list__item--row" th:each="e : ${meal.entries}">
                    <div>
                        <span class="entry-list__name" th:text="${e.foodName}">Food</span>
                        <span class="entry-list__meta" th:if="${e.notes}" th:text="${e.notes}"></span>
                    </div>
                    <div class="entry-list__meta">
                        <span th:text="${e.quantity}">100</span> g ·
                        <span th:text="${e.calories}">0</span> kcal
                    </div>
                    <form th:action="|/diary/delete/${e.id}?date=${date}|" method="post" class="inline-form">
                        <button type="submit" class="btn btn--text btn--danger" aria-label="Remove entry">Remove</button>
                    </form>
                </li>
            </ul>
            <p class="empty-hint" th:if="${meal.entries == null or meal.entries.isEmpty()}">Nothing logged yet.</p>
        </section>
    </main>
</div>

<div id="add-food-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <div class="modal__backdrop js-modal-close"></div>
    <div class="modal__panel card">
        <header class="modal__head">
            <h2 id="modal-title" class="modal__title">Add food</h2>
            <button type="button" class="modal__close js-modal-close" aria-label="Close">×</button>
        </header>
        <form class="form-stack" th:action="'/diary/add'" method="post" id="diary-add-form">
            <input type="hidden" name="date" th:value="${date}"/>
            <input type="hidden" name="mealType" id="modal-meal-type" value="breakfast"/>
            <input type="hidden" name="foodItemId" id="modal-food-item-id" value=""/>

            <label class="field">
                <span class="field__label">Search foods</span>
                <input type="search" id="food-search-input" class="js-food-search" placeholder="Type to search…" autocomplete="off"/>
            </label>
            <div id="food-search-results" class="food-search-results" role="listbox"></div>

            <label class="field">
                <span class="field__label">Amount (grams)</span>
                <input type="number" name="grams" value="100" min="1" step="1" required/>
            </label>
            <label class="field">
                <span class="field__label">Notes (optional)</span>
                <input type="text" name="notes" maxlength="500"/>
            </label>
            <button type="submit" class="btn btn--primary btn--block" id="modal-submit" disabled>Add to diary</button>
        </form>
    </div>
</div>

<script th:src="'/static/js/app.js'" src="/static/js/app.js"></script>
</body>
</html>
