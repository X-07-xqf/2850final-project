<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Nutrition goals — Sage</title>
    <link rel="stylesheet" th:href="'/static/css/styles.css'" href="/static/css/styles.css"/>
</head>
<body class="app-body">
<a href="#main" class="skip-link">Skip to main content</a>
<button type="button" class="menu-toggle js-menu-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
<div class="sidebar-backdrop js-sidebar-backdrop" aria-hidden="true"></div>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__logo" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19 C 5 10, 11 4, 19 4 C 19 13, 13 19, 5 19 Z"/><path d="M5 19 L 19 4"/></svg></span>
            <span class="sidebar__title">Sage</span>
        </div>
        <p class="sidebar__user" th:if="${session}" th:text="${session.fullName}">User</p>
        <nav class="sidebar__nav" aria-label="Main">
            <a th:href="'/dashboard'" th:classappend="${activePage == 'dashboard'} ? ' nav-link--active'" class="nav-link">Dashboard</a>
            <a th:href="'/diary'" th:classappend="${activePage == 'diary'} ? ' nav-link--active'" class="nav-link">Diary</a>
            <a th:href="'/recipes'" th:classappend="${activePage == 'recipes'} ? ' nav-link--active'" class="nav-link">Recipes</a>
            <a th:href="'/goals'" th:classappend="${activePage == 'goals'} ? ' nav-link--active'" class="nav-link">Goals</a>
            <a th:href="'/messages'" th:classappend="${activePage == 'messages'} ? ' nav-link--active'" class="nav-link">
                Messages
                <span th:if="${unreadMessages != null and unreadMessages > 0}" class="badge" th:text="${unreadMessages}">0</span>
            </a>
            <a th:href="'/profile'" th:classappend="${activePage == 'profile'} ? ' nav-link--active'" class="nav-link">Profile</a>
        </nav>
        <button type="button" class="sidebar__theme js-theme-toggle" aria-label="Toggle theme">Toggle theme</button>
        <a th:href="'/logout'" class="nav-link nav-link--muted sidebar__logout">Log out</a>
    </aside>
    <main id="main" class="main">
        <header class="page-header">
            <h1 class="page-title">Nutrition goals</h1>
            <p class="page-meta">Daily targets power your dashboard progress bars</p>
        </header>

        <div class="two-col two-col--goals">
            <section class="card">
                <h2 class="section-title">Daily targets</h2>
                <form class="form-stack" th:action="'/goals'" method="post">
                    <div class="goals-form__fields">
                        <label class="field">
                            <span class="field__label">Calories (kcal)</span>
                            <input type="number" name="calories" step="1" min="0" th:value="${goals['calories']}"/>
                        </label>
                        <label class="field">
                            <span class="field__label">Protein (g)</span>
                            <input type="number" name="protein" step="0.1" min="0" th:value="${goals['protein']}"/>
                        </label>
                        <label class="field">
                            <span class="field__label">Carbs (g)</span>
                            <input type="number" name="carbs" step="0.1" min="0" th:value="${goals['carbs']}"/>
                        </label>
                        <label class="field">
                            <span class="field__label">Fat (g)</span>
                            <input type="number" name="fat" step="0.1" min="0" th:value="${goals['fat']}"/>
                        </label>
                        <label class="field">
                            <span class="field__label">Fiber (g)</span>
                            <input type="number" name="fiber" step="0.1" min="0" th:value="${goals['fiber']}"/>
                        </label>
                    </div>
                    <button type="submit" class="btn btn--primary goals-form__submit">Save goals</button>
                </form>
            </section>

            <section class="card">
                <header class="weekly-head">
                    <div>
                        <h2 class="section-title weekly-head__title">Calories this week</h2>
                        <p class="weekly-head__label" th:text="${weekLabel}">May 4 – May 10, 2026</p>
                    </div>
                    <div class="date-nav date-nav--compact">
                        <a class="btn btn--ghost btn--small" th:href="|/goals?week=${prevWeek}|" aria-label="Previous week">←</a>
                        <a class="btn btn--ghost btn--small"
                           th:classappend="${isCurrentWeek} ? ' is-current'"
                           th:href="'/goals'">This week</a>
                        <a class="btn btn--ghost btn--small" th:href="|/goals?week=${nextWeek}|" aria-label="Next week">→</a>
                    </div>
                </header>
                <div class="weekly-chart" th:if="${weekly != null and !weekly.isEmpty()}">
                    <div class="weekly-chart__row"
                         th:each="w, iter : ${weekly}"
                         th:classappend="${w.rowClass}"
                         th:style="|--pct:${w.pct}%; --i:${iter.index}|">
                        <span class="weekly-chart__day" th:text="${w.dayName}">Mon</span>
                        <div class="weekly-chart__track" role="img"
                             th:attr="aria-label=|${w.dayName}: ${w.calories} kcal|">
                            <span class="weekly-chart__fill" aria-hidden="true"></span>
                        </div>
                        <span class="weekly-chart__val">
                            <span class="weekly-chart__num" th:text="${w.calories}">0</span>
                            <span class="weekly-chart__unit">kcal</span>
                        </span>
                    </div>
                </div>
                <p class="empty-hint" th:if="${weekly == null or weekly.isEmpty()}">Quiet week so far — log a meal to see progress.</p>
            </section>
        </div>
    </main>
</div>
<script th:src="'/static/js/app.js'" src="/static/js/app.js"></script>
</body>
</html>
