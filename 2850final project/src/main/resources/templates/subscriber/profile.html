<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Profile — Sage</title>
    <link rel="stylesheet" th:href="'/static/css/styles.css'" href="/static/css/styles.css"/>
</head>
<body class="app-body">
<a href="#main" class="skip-link">Skip to main content</a>
<button type="button" class="menu-toggle js-menu-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
<div class="sidebar-backdrop js-sidebar-backdrop" aria-hidden="true"></div>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__logo" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19 C 5 10, 11 4, 19 4 C 19 13, 13 19, 5 19 Z"/><path d="M5 19 L 19 4"/></svg></span>
            <span class="sidebar__title">Sage</span>
        </div>
        <p class="sidebar__user" th:if="${session}" th:text="${session.fullName}">User</p>
        <nav class="sidebar__nav" aria-label="Main">
            <a th:href="'/dashboard'" th:classappend="${activePage == 'dashboard'} ? ' nav-link--active'" class="nav-link">Dashboard</a>
            <a th:href="'/diary'" th:classappend="${activePage == 'diary'} ? ' nav-link--active'" class="nav-link">Diary</a>
            <a th:href="'/recipes'" th:classappend="${activePage == 'recipes'} ? ' nav-link--active'" class="nav-link">Recipes</a>
            <a th:href="'/goals'" th:classappend="${activePage == 'goals'} ? ' nav-link--active'" class="nav-link">Goals</a>
            <a th:href="'/messages'" th:classappend="${activePage == 'messages'} ? ' nav-link--active'" class="nav-link">
                Messages
                <span th:if="${unreadMessages != null and unreadMessages > 0}" class="badge" th:text="${unreadMessages}">0</span>
            </a>
            <a th:href="'/profile'" th:classappend="${activePage == 'profile'} ? ' nav-link--active'" class="nav-link">Profile</a>
        </nav>
        <button type="button" class="sidebar__theme js-theme-toggle" aria-label="Toggle theme">Toggle theme</button>
        <a th:href="'/logout'" class="nav-link nav-link--muted sidebar__logout">Log out</a>
    </aside>
    <main id="main" class="main">
        <header class="page-header">
            <h1 class="page-title">Your profile</h1>
            <p class="page-meta">Account details and saved recipes</p>
        </header>

        <div class="two-col">
            <section class="card">
                <h2 class="section-title">Account</h2>
                <form class="form-stack" th:action="'/profile'" method="post">
                    <label class="field">
                        <span class="field__label">Full name</span>
                        <input type="text" name="fullName" required th:value="${user.fullName}"/>
                    </label>
                    <label class="field">
                        <span class="field__label">Email</span>
                        <input type="email" name="email" required th:value="${user.email}"/>
                    </label>
                    <label class="field">
                        <span class="field__label">New password (optional)</span>
                        <input type="password" name="password" autocomplete="new-password" placeholder="Leave blank to keep current"/>
                    </label>
                    <p class="field-hint">Role: <strong th:text="${user.role}">subscriber</strong></p>
                    <button type="submit" class="btn btn--primary">Save changes</button>
                </form>
            </section>

            <section class="card">
                <h2 class="section-title">Favourite recipes</h2>
                <ul class="fav-recipe-list" th:if="${favourites != null and !favourites.isEmpty()}">
                    <li th:each="f : ${favourites}" class="fav-card">
                        <a th:href="|/recipes/${f.id}|" class="fav-card__link">
                            <div class="fav-card__cover">
                                <img th:if="${f.imageUrl != null}" th:src="${f.imageUrl}" th:alt="${f.title}"
                                     width="160" height="160" loading="lazy"/>
                                <div th:if="${f.imageUrl == null}" class="fav-card__cover-fallback"
                                     th:classappend="|recipe-card__cover--${f.coverTone}|">
                                    <span th:text="${f.coverEmoji}">🍽️</span>
                                </div>
                            </div>
                            <div class="fav-card__body">
                                <span class="fav-card__title" th:text="${f.title}">Recipe</span>
                                <span class="fav-card__meta">
                                    <span th:text="${f.difficulty}">easy</span>
                                    <span th:if="${f.reviewCount > 0}"> · ★ <span th:text="${f.avgRating}">0</span></span>
                                    <span th:if="${f.reviewCount == 0}" class="fav-card__unrated"> · Not rated yet</span>
                                </span>
                            </div>
                        </a>
                    </li>
                </ul>
                <p class="empty-hint" th:if="${favourites == null or favourites.isEmpty()}">No favourites yet — explore recipes and tap Save.</p>
            </section>
        </div>
    </main>
</div>
<script th:src="'/static/js/app.js'" src="/static/js/app.js"></script>
</body>
</html>
