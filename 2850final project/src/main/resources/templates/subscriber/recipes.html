<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Recipes — Good Food</title>
    <link rel="stylesheet" th:href="'/static/css/styles.css'" href="/static/css/styles.css"/>
</head>
<body class="app-body">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar__brand">
            <span class="sidebar__logo">🥗</span>
            <span class="sidebar__title">Good Food</span>
        </div>
        <p class="sidebar__user" th:if="${session}" th:text="${session.fullName}">User</p>
        <nav class="sidebar__nav" aria-label="Main">
            <a th:href="'/dashboard'" th:classappend="${activePage == 'dashboard'} ? ' nav-link--active'" class="nav-link">Dashboard</a>
            <a th:href="'/diary'" th:classappend="${activePage == 'diary'} ? ' nav-link--active'" class="nav-link">Diary</a>
            <a th:href="'/recipes'" th:classappend="${activePage == 'recipes'} ? ' nav-link--active'" class="nav-link">Recipes</a>
            <a th:href="'/goals'" th:classappend="${activePage == 'goals'} ? ' nav-link--active'" class="nav-link">Goals</a>
            <a th:href="'/messages'" th:classappend="${activePage == 'messages'} ? ' nav-link--active'" class="nav-link">
                Messages
                <span th:if="${unreadMessages != null and unreadMessages > 0}" class="badge" th:text="${unreadMessages}">0</span>
            </a>
            <a th:href="'/profile'" th:classappend="${activePage == 'profile'} ? ' nav-link--active'" class="nav-link">Profile</a>
        </nav>
        <a th:href="'/logout'" class="nav-link nav-link--muted sidebar__logout">Log out</a>
    </aside>
    <main class="main">
        <header class="page-header">
            <h1 class="page-title">Recipes</h1>
            <p class="page-meta">Browse and cook balanced meals</p>
        </header>

        <form class="card filter-bar" method="get" th:action="'/recipes'">
            <label class="field field--inline">
                <span class="field__label">Search</span>
                <input type="search" name="q" placeholder="Title…" th:value="${query}"/>
            </label>
            <label class="field field--inline">
                <span class="field__label">Difficulty</span>
                <select name="difficulty" class="input-select">
                    <option value="all" th:selected="${difficulty == 'all'}">All</option>
                    <option value="easy" th:selected="${difficulty == 'easy'}">Easy</option>
                    <option value="medium" th:selected="${difficulty == 'medium'}">Medium</option>
                    <option value="hard" th:selected="${difficulty == 'hard'}">Hard</option>
                </select>
            </label>
            <button type="submit" class="btn btn--primary">Apply</button>
        </form>

        <div class="recipe-grid" th:if="${recipes != null and !recipes.isEmpty()}">
            <article class="card recipe-card" th:each="r : ${recipes}">
                <a th:href="|/recipes/${r.id}|" class="recipe-card__link">
                    <h2 class="recipe-card__title" th:text="${r.title}">Recipe</h2>
                    <p class="recipe-card__desc" th:text="${r.description}">Description</p>
                    <div class="recipe-card__meta">
                        <span th:text="${r.difficulty}">easy</span>
                        ·
                        <span th:text="${r.totalTime}">30</span> min
                        ·
                        ★ <span th:text="${r.avgRating}">0</span>
                        (<span th:text="${r.reviewCount}">0</span>)
                    </div>
                </a>
            </article>
        </div>
        <p class="empty-hint card" th:if="${recipes == null or recipes.isEmpty()}">No recipes match your filters.</p>
    </main>
</div>
<script th:src="'/static/js/app.js'" src="/static/js/app.js"></script>
</body>
</html>
