# Detekt configuration for the Good Food project.


build:
  # First-pass tolerance — the team is wiring Detekt up for the first time and
  # there is a baseline of pre-existing style findings to clean up incrementally.
  # The CI workflow uploads the HTML report on every run so the team can browse
  # findings and tighten this number per sprint. Set back to 0 once the codebase
  # is clean.
  maxIssues: 250
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    active: true
    threshold: 80       
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  ComplexCondition:
    active: true
    threshold: 5
  TooManyFunctions:
    active: true
    thresholdInClasses: 25
    thresholdInObjects: 25

style:
  MagicNumber:
    active: false       
  WildcardImport:
    active: false        
  MaxLineLength:
    active: true
    maxLineLength: 140
  UnusedPrivateMember:
    active: true
  ReturnCount:
    active: true
    max: 6              

naming:
  FunctionNaming:
    active: true
  TopLevelPropertyNaming:
    active: true
  ClassNaming:
    active: true

empty-blocks:
  EmptyCatchBlock:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: false        
  SwallowedException:
    active: true

potential-bugs:
  UnsafeCast:
    active: true
  UnsafeCallOnNullableType:
    active: true
